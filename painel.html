<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Art Moveis — Painel Admin v0.3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,system-ui,sans-serif;background:#f5f5f5;color:#333}
.header{background:linear-gradient(135deg,#b91c1c,#ef4444);padding:20px;color:#fff}.header h1{font-size:20px;font-weight:900}.header p{font-size:12px;opacity:.7;margin-top:4px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:0;z-index:10;overflow-x:auto}
.tabs button{flex-shrink:0;padding:12px 10px;font-size:12px;font-weight:700;border:none;background:none;cursor:pointer;color:#999;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tabs button.active{color:#b91c1c;border-bottom-color:#b91c1c}
.tab-content{display:none;padding:16px;padding-bottom:80px}.tab-content.active{display:block}
.filters{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px}
.filters button{padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.filters button.active{background:#b91c1c;color:#fff;border-color:#b91c1c}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
.stat{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}.stat .num{font-size:22px;font-weight:900;color:#b91c1c}.stat .label{font-size:10px;color:#999;margin-top:3px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block}
.badge-approved{background:#dcfce7;color:#166534}.badge-pending{background:#fef9c3;color:#854d0e}.badge-rejected{background:#fee2e2;color:#991b1b}.badge-cancelled{background:#f3f4f6;color:#6b7280}.badge-shipped{background:#dbeafe;color:#1e40af}.badge-delivered{background:#d1fae5;color:#065f46}
.info{font-size:12px;color:#666;margin:3px 0}.total{font-size:16px;font-weight:900;color:#b91c1c}
.btn{padding:6px 12px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}.btn:active{transform:scale(.95)}
.btn-red{background:#b91c1c;color:#fff}.btn-green{background:#16a34a;color:#fff}.btn-blue{background:#2563eb;color:#fff}.btn-gray{background:#f3f4f6;color:#666}
.actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:24px}
.modal h3{font-size:16px;font-weight:900;margin-bottom:16px}
.modal label{display:block;font-size:11px;font-weight:700;color:#999;margin-bottom:4px;margin-top:12px;text-transform:uppercase}
.modal input,.modal select,.modal textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}.modal input:focus,.modal select:focus{border-color:#b91c1c}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}.loading{text-align:center;padding:60px;color:#999}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;animation:fadeInUp .3s ease}
.banner-preview{width:100%;height:120px;border-radius:12px;object-fit:cover;margin-top:8px;border:1px solid #eee}
@keyframes fadeInUp{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div class="header"><h1>Painel Admin — Art Moveis</h1><p>Gestao completa v0.3</p></div>
<div class="tabs">
<button class="active" onclick="switchTab('pedidos')">Pedidos</button>
<button onclick="switchTab('vendedores')">Vendedores</button>
<button onclick="switchTab('clientes')">Clientes</button>
<button onclick="switchTab('cupons')">Cupons</button>
<button onclick="switchTab('banners')">Banners</button>
</div>
<div id="tab-pedidos" class="tab-content active"><div class="stats" id="stats"></div><div class="filters" id="filters"></div><div style="margin-bottom:12px"><button class="btn btn-green" onclick="showNewOrderModal()">+ Novo Pedido</button></div><div id="orders"><div class="loading">Carregando...</div></div></div>
<div id="tab-vendedores" class="tab-content"><div style="margin-bottom:12px"><button class="btn btn-green" onclick="showNewSellerModal()">+ Novo Vendedor</button></div><div id="sellers"></div></div>
<div id="tab-clientes" class="tab-content"><div id="clients"></div></div>
<div id="tab-cupons" class="tab-content"><div style="margin-bottom:12px"><button class="btn btn-green" onclick="showNewCouponModal()">+ Novo Cupom</button></div><div id="coupons"></div></div>
<div id="tab-banners" class="tab-content"><div style="margin-bottom:12px"><button class="btn btn-green" onclick="showNewBannerModal()">+ Novo Banner</button></div><div id="bannersList"></div></div>
<div id="modal-container"></div><div id="toast-container"></div>
<script>
const API='';let allOrders=[],allSellers=[],allClients=[],allCoupons=[],allBanners=[];
function toast(m){const d=document.getElementById('toast-container');d.innerHTML='<div class="toast">'+m+'</div>';setTimeout(()=>d.innerHTML='',3000);}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function switchTab(t){document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');document.querySelector('.tabs button[onclick="switchTab(\''+t+'\')"]').classList.add('active');if(t==='vendedores')loadSellers();if(t==='clientes')loadClients();if(t==='cupons')loadCoupons();if(t==='banners')loadBanners();}

// PEDIDOS
async function loadOrders(){try{const r=await fetch(API+'/pedidos?limit=500');const d=await r.json();allOrders=d.pedidos||[];renderOrders('all');}catch{document.getElementById('orders').innerHTML='<div class="empty">Erro</div>';}}
function renderOrders(f){const list=f==='all'?allOrders:allOrders.filter(o=>o.status===f);const ap=allOrders.filter(o=>o.status==='approved');const tv=ap.reduce((s,o)=>s+Number(o.total||0),0);const cv=allOrders.filter(o=>o.seller_code&&o.seller_code!=='RETIRADA_LOJA');
document.getElementById('stats').innerHTML='<div class="stat"><div class="num">'+allOrders.length+'</div><div class="label">Total</div></div><div class="stat"><div class="num">'+ap.length+'</div><div class="label">Pagos</div></div><div class="stat"><div class="num">R$ '+tv.toFixed(2)+'</div><div class="label">Faturamento</div></div><div class="stat"><div class="num">'+cv.length+'</div><div class="label">Com Vendedor</div></div>';
const fs=['all','approved','pending','rejected','shipped','delivered','cancelled'];const lb={all:'Todos',approved:'Pagos',pending:'Pendentes',rejected:'Recusados',shipped:'Enviados',delivered:'Entregues',cancelled:'Cancelados'};
document.getElementById('filters').innerHTML=fs.map(x=>'<button class="'+(f===x?'active':'')+'" onclick="renderOrders(\''+x+'\')">'+lb[x]+' ('+(x==='all'?allOrders.length:allOrders.filter(o=>o.status===x).length)+')</button>').join('');
if(!list.length){document.getElementById('orders').innerHTML='<div class="empty">Nenhum pedido</div>';return;}
document.getElementById('orders').innerHTML=list.map(o=>{const it=(Array.isArray(o.items)?o.items:(function(){try{return JSON.parse(o.items)||[];}catch(e){return [];}}())).map(i=>i.name+' x'+i.qty).join(', ');const bd='badge-'+(o.status||'pending');const sl={approved:'Pago',pending:'Pendente',rejected:'Recusado',shipped:'Enviado',delivered:'Entregue',cancelled:'Cancelado'};const dt=o.created_at?new Date(o.created_at).toLocaleString('pt-BR'):'';let en='';try{const e=typeof o.endereco==='string'?JSON.parse(o.endereco):o.endereco;if(e)en=[e.rua,e.numero,e.bairro,e.cidade,'CEP '+e.cep].filter(Boolean).join(', ');}catch(e){}
return '<div class="card"><div class="top"><span style="font-weight:800;font-size:13px">'+o.id+'</span><span class="badge '+bd+'">'+(sl[o.status]||o.status)+'</span></div><div class="info"><strong>'+(o.cliente_nome||'—')+'</strong> &middot; '+(o.cliente_email||'')+'</div><div class="info">'+(o.cliente_telefone||'')+' &middot; '+dt+'</div>'+(o.payment_method?'<div class="info">Pagamento: '+o.payment_method+'</div>':'')+(o.seller_code?'<div class="info" style="color:'+(o.seller_code==='RETIRADA_LOJA'?'#166534':'#2563eb')+'">'+(o.seller_code==='RETIRADA_LOJA'?'Retirada na loja':'Vendedor: '+o.seller_code)+'</div>':'')+(en?'<div class="info">End: '+en+'</div>':'')+'<div class="info" style="color:#888;font-size:11px">'+it+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><span style="font-size:11px;color:#999">Frete: R$ '+Number(o.frete||0).toFixed(2)+'</span><span class="total">R$ '+Number(o.total||0).toFixed(2)+'</span></div><div class="actions"><select onchange="updateOrderStatus(\''+o.id+'\',this.value)" style="padding:5px 8px;border-radius:6px;border:1px solid #ddd;font-size:11px;font-weight:600">'+['pending','approved','shipped','delivered','rejected','cancelled'].map(s=>'<option value="'+s+'" '+(o.status===s?'selected':'')+'>'+sl[s]+'</option>').join('')+'</select><button class="btn btn-blue" onclick="reenviarEmail(\''+o.id+'\')">Email</button>'+(o.status!=='cancelled'?'<button class="btn btn-gray" onclick="cancelOrder(\''+o.id+'\')">Cancelar</button>':'')+'</div></div>';}).join('');
}
async function updateOrderStatus(id,s){try{await fetch(API+'/pedidos/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})});toast('Status: '+s);loadOrders();}catch{toast('Erro');}}
async function reenviarEmail(id){try{const r=await fetch(API+'/pedidos/'+id+'/reenviar-email',{method:'POST'});const d=await r.json();toast(d.ok?'Email reenviado':'Erro');}catch{toast('Erro');}}
async function cancelOrder(id){if(!confirm('Cancelar?'))return;try{await fetch(API+'/pedidos/'+id,{method:'DELETE'});toast('Cancelado');loadOrders();}catch{toast('Erro');}}
function showNewOrderModal(){document.getElementById('modal-container').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>Novo Pedido</h3><label>Nome</label><input id="no-nome"><label>Email</label><input id="no-email"><label>Telefone</label><input id="no-tel"><label>Produto</label><input id="no-item"><label>Qtd</label><input id="no-qty" type="number" value="1"><label>Preco (R$)</label><input id="no-price" type="number" step="0.01"><label>Frete</label><input id="no-frete" type="number" step="0.01" value="0"><label>Vendedor</label><input id="no-seller"><label>Status</label><select id="no-status"><option value="approved">Pago</option><option value="pending">Pendente</option></select><div style="display:flex;gap:8px;margin-top:20px"><button class="btn btn-green" style="flex:1;padding:12px" onclick="createOrder()">Criar</button><button class="btn btn-gray" style="padding:12px" onclick="closeModal()">Cancelar</button></div></div></div>';}
async function createOrder(){const n=document.getElementById('no-nome').value,e=document.getElementById('no-email').value,t=document.getElementById('no-tel').value,i=document.getElementById('no-item').value,q=Number(document.getElementById('no-qty').value)||1,p=Number(document.getElementById('no-price').value)||0,fr=Number(document.getElementById('no-frete').value)||0,se=document.getElementById('no-seller').value,st=document.getElementById('no-status').value;if(!n||!i||!p)return toast('Preencha campos');try{const r=await fetch(API+'/pedidos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cliente_nome:n,cliente_email:e,cliente_telefone:t,items:[{name:i,qty:q,price:p}],subtotal:p*q,frete:fr,desconto:0,total:p*q+fr,seller_code:se||null,status:st})});const d=await r.json();if(d.ok){toast('Pedido: '+d.pedido_id);closeModal();loadOrders();}else toast(d.erro||'Erro');}catch{toast('Erro');}}

// VENDEDORES
async function loadSellers(){try{const r=await fetch(API+'/vendedores');const d=await r.json();allSellers=d.vendedores||[];renderSellers();}catch{document.getElementById('sellers').innerHTML='<div class="empty">Erro</div>';}}
function renderSellers(){if(!allSellers.length){document.getElementById('sellers').innerHTML='<div class="empty">Nenhum vendedor</div>';return;}document.getElementById('sellers').innerHTML=allSellers.map(v=>'<div class="card"><div class="top"><span style="font-weight:800">'+v.nome+'</span><span class="badge '+(v.ativo?'badge-approved':'badge-rejected')+'">'+(v.ativo?'Ativo':'Inativo')+'</span></div><div class="info">Codigo: <strong style="font-family:monospace;color:#b91c1c">'+v.codigo+'</strong></div><div class="info">CPF: '+v.cpf+' &middot; Loja: '+v.loja+'</div><div class="info">Comissao: '+Number(v.comissao).toFixed(1)+'%</div><div class="actions"><button class="btn btn-blue" onclick=\'editSeller('+JSON.stringify(v).replace(/'/g,"&#39;")+')\'>Editar</button><button class="btn btn-gray" onclick="toggleSeller(\''+v.id+'\','+(!v.ativo)+')">'+(v.ativo?'Desativar':'Ativar')+'</button><button class="btn btn-gray" onclick="deleteSeller(\''+v.id+'\')">Excluir</button></div></div>').join('');}
function showNewSellerModal(v){var e=!!v;document.getElementById('modal-container').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>'+(e?'Editar':'Novo')+' Vendedor</h3><label>Nome</label><input id="sv-nome" value="'+(v?.nome||'')+'"><label>CPF</label><input id="sv-cpf" value="'+(v?.cpf||'')+'"><label>Loja</label><input id="sv-loja" value="'+(v?.loja||'')+'"><label>Codigo</label><input id="sv-codigo" value="'+(v?.codigo||'')+'" style="text-transform:uppercase;font-family:monospace"><label>Comissao (%)</label><input id="sv-comissao" type="number" step="0.1" value="'+(v?.comissao||0)+'"><div style="display:flex;gap:8px;margin-top:20px"><button class="btn btn-green" style="flex:1;padding:12px" onclick="'+(e?"saveSeller('"+v.id+"')":"createSeller()")+'">'+(e?'Salvar':'Cadastrar')+'</button><button class="btn btn-gray" style="padding:12px" onclick="closeModal()">Cancelar</button></div></div></div>';}
function editSeller(v){showNewSellerModal(v);}
async function createSeller(){var b={nome:document.getElementById('sv-nome').value,cpf:document.getElementById('sv-cpf').value,loja:document.getElementById('sv-loja').value,codigo:document.getElementById('sv-codigo').value,comissao:Number(document.getElementById('sv-comissao').value)||0};if(!b.nome||!b.cpf||!b.loja||!b.codigo)return toast('Preencha tudo');try{var r=await fetch(API+'/vendedores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});var d=await r.json();if(d.ok){toast('Cadastrado');closeModal();loadSellers();}else toast(d.erro||'Erro');}catch{toast('Erro');}}
async function saveSeller(id){var b={nome:document.getElementById('sv-nome').value,cpf:document.getElementById('sv-cpf').value,loja:document.getElementById('sv-loja').value,codigo:document.getElementById('sv-codigo').value,comissao:Number(document.getElementById('sv-comissao').value)||0};try{await fetch(API+'/vendedores/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});toast('Atualizado');closeModal();loadSellers();}catch{toast('Erro');}}
async function toggleSeller(id,a){try{await fetch(API+'/vendedores/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ativo:a})});toast(a?'Ativado':'Desativado');loadSellers();}catch{toast('Erro');}}
async function deleteSeller(id){if(!confirm('Excluir?'))return;try{await fetch(API+'/vendedores/'+id,{method:'DELETE'});toast('Excluido');loadSellers();}catch{toast('Erro');}}

// CLIENTES
async function loadClients(){try{var r=await fetch(API+'/clientes');var d=await r.json();allClients=d.clientes||[];renderClients();}catch{document.getElementById('clients').innerHTML='<div class="empty">Erro</div>';}}
function renderClients(){if(!allClients.length){document.getElementById('clients').innerHTML='<div class="empty">Nenhum cliente</div>';return;}document.getElementById('clients').innerHTML=allClients.map(c=>'<div class="card"><div style="font-weight:800;margin-bottom:6px">'+(c.nome||'—')+'</div><div class="info">'+(c.email||'')+'</div><div class="info">'+(c.telefone||'')+'</div><div class="actions"><button class="btn btn-blue" onclick=\'editClient('+JSON.stringify(c).replace(/'/g,"&#39;")+')\'>Editar</button></div></div>').join('');}
function editClient(c){document.getElementById('modal-container').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>Editar Cliente</h3><label>Nome</label><input id="ec-nome" value="'+(c.nome||'')+'"><label>Email</label><input id="ec-email" value="'+(c.email||'')+'"><label>Telefone</label><input id="ec-tel" value="'+(c.telefone||'')+'"><label>Endereco</label><textarea id="ec-end" rows="2">'+(c.endereco||'')+'</textarea><div style="display:flex;gap:8px;margin-top:20px"><button class="btn btn-green" style="flex:1;padding:12px" onclick="saveClient(\''+c.id+'\')">Salvar</button><button class="btn btn-gray" style="padding:12px" onclick="closeModal()">Cancelar</button></div></div></div>';}
async function saveClient(id){var b={nome:document.getElementById('ec-nome').value,email:document.getElementById('ec-email').value,telefone:document.getElementById('ec-tel').value,endereco:document.getElementById('ec-end').value};try{await fetch(API+'/clientes/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});toast('Atualizado');closeModal();loadClients();}catch{toast('Erro');}}

// CUPONS
async function loadCoupons(){try{var r=await fetch(API+'/cupons');var d=await r.json();allCoupons=d.cupons||[];renderCoupons();}catch{document.getElementById('coupons').innerHTML='<div class="empty">Erro</div>';}}
function renderCoupons(){if(!allCoupons.length){document.getElementById('coupons').innerHTML='<div class="empty">Nenhum cupom</div>';return;}var tl={fixed:'Valor fixo (R$)',percent:'Porcentagem (%)',shipping:'Frete gratis'};document.getElementById('coupons').innerHTML=allCoupons.map(c=>{var ex=c.validade&&new Date(c.validade)<new Date();return '<div class="card"><div class="top"><span style="font-weight:800;font-family:monospace;font-size:16px;color:#b91c1c">'+c.codigo+'</span><span class="badge '+(c.ativo&&!ex?'badge-approved':'badge-rejected')+'">'+(ex?'Expirado':c.ativo?'Ativo':'Inativo')+'</span></div><div class="info">'+(c.descricao||'')+'</div><div class="info">Tipo: <strong>'+(tl[c.tipo]||c.tipo)+'</strong> &middot; Valor: <strong>'+(c.tipo==='percent'?c.valor+'%':'R$ '+Number(c.valor).toFixed(2))+'</strong></div><div class="info">'+(c.primeira_compra?'1a compra &middot; ':'')+(c.valor_minimo>0?'Min: R$ '+Number(c.valor_minimo).toFixed(2)+' &middot; ':'')+(c.uso_maximo>0?'Usos: '+(c.uso_atual||0)+'/'+c.uso_maximo:'Ilimitado')+'</div>'+(c.validade?'<div class="info">Validade: '+new Date(c.validade).toLocaleString('pt-BR')+'</div>':'')+'<div class="actions"><button class="btn btn-blue" onclick=\'editCoupon('+JSON.stringify(c).replace(/'/g,"&#39;")+')\'>Editar</button><button class="btn btn-gray" onclick="toggleCoupon(\''+c.id+'\','+(!c.ativo)+')">'+(c.ativo?'Desativar':'Ativar')+'</button><button class="btn btn-gray" onclick="deleteCoupon(\''+c.id+'\')">Excluir</button></div></div>';}).join('');}
function showNewCouponModal(c){var e=!!c;var vl=c?.validade?new Date(c.validade).toISOString().slice(0,16):'';document.getElementById('modal-container').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>'+(e?'Editar':'Novo')+' Cupom</h3><label>Codigo</label><input id="cp-codigo" value="'+(c?.codigo||'')+'" style="text-transform:uppercase;font-family:monospace;font-size:16px;font-weight:900"><label>Tipo</label><select id="cp-tipo"><option value="fixed" '+(c?.tipo==='fixed'?'selected':'')+'>Valor fixo (R$)</option><option value="percent" '+(c?.tipo==='percent'?'selected':'')+'>Porcentagem (%)</option><option value="shipping" '+(c?.tipo==='shipping'?'selected':'')+'>Frete gratis</option></select><label>Valor (R$ ou %)</label><input id="cp-valor" type="number" step="0.01" value="'+(c?.valor||0)+'"><label>Descricao</label><input id="cp-desc" value="'+(c?.descricao||'')+'"><label>Valor minimo (R$)</label><input id="cp-min" type="number" step="0.01" value="'+(c?.valor_minimo||0)+'"><label>Uso maximo (0=ilimitado)</label><input id="cp-max" type="number" value="'+(c?.uso_maximo||0)+'"><label>Validade</label><input id="cp-val" type="datetime-local" value="'+vl+'"><label style="display:flex;align-items:center;gap:8px;margin-top:12px"><input type="checkbox" id="cp-first" '+(c?.primeira_compra?'checked':'')+' style="width:auto"> Somente 1a compra</label><div style="display:flex;gap:8px;margin-top:20px"><button class="btn btn-green" style="flex:1;padding:12px" onclick="'+(e?"saveCoupon('"+c.id+"')":"createCoupon()")+'">'+(e?'Salvar':'Criar')+'</button><button class="btn btn-gray" style="padding:12px" onclick="closeModal()">Cancelar</button></div></div></div>';}
function editCoupon(c){showNewCouponModal(c);}
function cpForm(){return{codigo:document.getElementById('cp-codigo').value,tipo:document.getElementById('cp-tipo').value,valor:Number(document.getElementById('cp-valor').value)||0,descricao:document.getElementById('cp-desc').value,valor_minimo:Number(document.getElementById('cp-min').value)||0,uso_maximo:Number(document.getElementById('cp-max').value)||0,validade:document.getElementById('cp-val').value||null,primeira_compra:document.getElementById('cp-first').checked};}
async function createCoupon(){var b=cpForm();if(!b.codigo||!b.tipo)return toast('Codigo e tipo obrigatorios');try{var r=await fetch(API+'/cupons',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});var d=await r.json();if(d.ok){toast('Cupom criado');closeModal();loadCoupons();}else toast(d.erro||'Erro');}catch{toast('Erro');}}
async function saveCoupon(id){var b=cpForm();try{await fetch(API+'/cupons/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});toast('Atualizado');closeModal();loadCoupons();}catch{toast('Erro');}}
async function toggleCoupon(id,a){try{await fetch(API+'/cupons/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ativo:a})});toast(a?'Ativado':'Desativado');loadCoupons();}catch{toast('Erro');}}
async function deleteCoupon(id){if(!confirm('Excluir cupom?'))return;try{await fetch(API+'/cupons/'+id,{method:'DELETE'});toast('Excluido');loadCoupons();}catch{toast('Erro');}}

// BANNERS
var bannerImg64=null;
async function loadBanners(){try{var r=await fetch(API+'/banners/todos');var d=await r.json();allBanners=d.banners||[];renderBanners();}catch{document.getElementById('bannersList').innerHTML='<div class="empty">Erro</div>';}}
function renderBanners(){if(!allBanners.length){document.getElementById('bannersList').innerHTML='<div class="empty">Nenhum banner</div>';return;}document.getElementById('bannersList').innerHTML=allBanners.map(b=>'<div class="card"><div class="top"><span style="font-weight:800">'+b.titulo+'</span><span class="badge '+(b.ativo?'badge-approved':'badge-rejected')+'">'+(b.ativo?'Ativo':'Inativo')+'</span></div>'+(b.subtitulo?'<div class="info">'+b.subtitulo+'</div>':'')+(b.imagem_url?'<img src="'+b.imagem_url+'" class="banner-preview">':'<div class="info" style="color:#bbb">Sem imagem — cor: '+(b.cor_fundo||'#b91c1c')+'</div>')+'<div class="info">Ordem: '+(b.ordem||0)+(b.link_acao?' &middot; Acao: '+b.link_acao:'')+'</div><div class="actions"><button class="btn btn-blue" onclick=\'editBanner('+JSON.stringify(b).replace(/'/g,"&#39;")+')\'>Editar</button><button class="btn btn-gray" onclick="toggleBanner(\''+b.id+'\','+(!b.ativo)+')">'+(b.ativo?'Desativar':'Ativar')+'</button><button class="btn btn-gray" onclick="deleteBanner(\''+b.id+'\')">Excluir</button></div></div>').join('');}
function showNewBannerModal(b){var e=!!b;bannerImg64=null;document.getElementById('modal-container').innerHTML='<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>'+(e?'Editar':'Novo')+' Banner</h3><label>Titulo</label><input id="bn-titulo" value="'+(b?.titulo||'')+'"><label>Subtitulo</label><input id="bn-sub" value="'+(b?.subtitulo||'')+'"><label>Imagem</label><input id="bn-img" type="file" accept="image/*" onchange="prevBannerImg(this)">'+(b?.imagem_url?'<img src="'+b.imagem_url+'" class="banner-preview" id="bn-preview">':'<div id="bn-preview"></div>')+'<label>Link/acao</label><input id="bn-acao" value="'+(b?.link_acao||'')+'"><label>Cor de fundo</label><input id="bn-cor" type="color" value="'+(b?.cor_fundo||'#b91c1c')+'" style="height:40px"><label>Ordem</label><input id="bn-ordem" type="number" value="'+(b?.ordem||0)+'"><div style="display:flex;gap:8px;margin-top:20px"><button class="btn btn-green" style="flex:1;padding:12px" onclick="'+(e?"saveBanner('"+b.id+"')":"createBanner()")+'">'+(e?'Salvar':'Criar')+'</button><button class="btn btn-gray" style="padding:12px" onclick="closeModal()">Cancelar</button></div></div></div>';}
function prevBannerImg(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){bannerImg64=e.target.result;document.getElementById('bn-preview').innerHTML='<img src="'+bannerImg64+'" class="banner-preview">';};r.readAsDataURL(f);}
function editBanner(b){showNewBannerModal(b);}
async function createBanner(){var bd={titulo:document.getElementById('bn-titulo').value,subtitulo:document.getElementById('bn-sub').value,acao:document.getElementById('bn-acao').value,cor_fundo:document.getElementById('bn-cor').value,ordem:Number(document.getElementById('bn-ordem').value)||0};if(!bd.titulo)return toast('Titulo obrigatorio');if(bannerImg64)bd.imagem_base64=bannerImg64;try{var r=await fetch(API+'/banners',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bd)});var d=await r.json();if(d.ok){toast('Banner criado');closeModal();loadBanners();}else toast(d.erro||'Erro');}catch{toast('Erro');}}
async function saveBanner(id){var bd={titulo:document.getElementById('bn-titulo').value,subtitulo:document.getElementById('bn-sub').value,acao:document.getElementById('bn-acao').value,cor_fundo:document.getElementById('bn-cor').value,ordem:Number(document.getElementById('bn-ordem').value)||0};if(bannerImg64)bd.imagem_base64=bannerImg64;try{await fetch(API+'/banners/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(bd)});toast('Atualizado');closeModal();loadBanners();}catch{toast('Erro');}}
async function toggleBanner(id,a){try{await fetch(API+'/banners/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ativo:a})});toast(a?'Ativado':'Desativado');loadBanners();}catch{toast('Erro');}}
async function deleteBanner(id){if(!confirm('Excluir?'))return;try{await fetch(API+'/banners/'+id,{method:'DELETE'});toast('Excluido');loadBanners();}catch{toast('Erro');}}

loadOrders();setInterval(loadOrders,30000);
</script>
